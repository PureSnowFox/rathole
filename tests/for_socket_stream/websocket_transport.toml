[client]
remote_addr = "127.0.0.1:2344"
default_token = "default_token_if_not_specify"

[client.transport]
type = "websocket"
[client.transport.websocket]
tls = false

[client.services.echo]
type = "socket_stream"
local_addr = "/tmp/rathole_integration_test/echo.sock"
[client.services.pingpong]
type = "socket_stream"
local_addr = "/tmp/rathole_integration_test/pingpong.sock"


[server]
bind_addr = "0.0.0.0:2344"
default_token = "default_token_if_not_specify"

[server.transport]
type = "websocket"
[server.transport.websocket]
tls = false

[server.services.echo]
type = "socket_stream"
bind_addr = "/tmp/rathole_integration_test/echo_exposed.sock"
[server.services.pingpong]
type = "socket_stream"
bind_addr = "/tmp/rathole_integration_test/pingpong_exposed.sock"
